<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch-a-Sketch</title>
  <link rel="stylesheet" href="etch-a-sketch.css">
  <script src="etch-a-sketch.js" defer></script>
</head>
<body>
  <main class="main">
    <h1 class="title">Odin Etch-a-Sketch</h1>
    <div class="wrapper">
      <div class="btn-container">
        <input class="btn color-picker" type="color">
        <button class="btn size-btn"><img class="icon size-icon" src="./icons/arrow-left-right-bold.svg" alt="size-button"></button>
        <button class="btn grid-btn"><img class="icon grid-icon" src="./icons/border-none.svg" alt="grid-button"></button>
        <button class="btn gradation-btn"><img class="icon gradation-icon" src="./icons/gradient-vertical.svg" alt="gradation-button"></button>
        <button class="btn erase-btn"><img class="icon erase-icon" src="./icons/eraser.svg" alt="erase-button"></button>
        <button class="btn clear-btn"><img class="icon clear-icon" src="./icons/broom.svg" alt="clear-button"></button>
      </div>
      <div class="container"></div>
      <div class="dummy-container"></div>
    </div>
    <div class="size-display"></div>
  </main>
  <footer class="footer">
    <small><a class="portfolio-link" href="https://daik102.github.io/admin-dashboard/" target="_blank">2025 Daik</a></small>
  </footer>
</body>
</html>
